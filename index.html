<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Handy Tool</title>
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<main id="app">

  <!-- Compass -->
  <section id="compass-card" class="card">
    <div class="dial-wrap">
      <div class="lubber"></div>
      <svg id="compass-rose" viewBox="-110 -110 220 220" aria-hidden="true"></svg>
      <div class="dial-center">
        <span id="heading-value" class="big-num">–––</span><span class="unit">°</span>
      </div>
    </div>
  </section>

  <!-- Spirit level -->
  <section id="level-card" class="card" data-mode="flat">

    <!-- flat mode: 2D bubble vial -->
    <div id="level-flat">
      <div class="vial">
        <div class="vial-ring r1"></div>
        <div class="vial-ring r2"></div>
        <div class="vial-cross"></div>
        <div id="bubble"></div>
      </div>
      <div class="level-readouts">
        <div class="readout">
          <svg class="axis-ico" viewBox="0 0 24 24"><path d="M12 3l4 5h-3v8h3l-4 5-4-5h3V8H8z"/></svg>
          <span id="pitch-value" class="mid-num">0.0</span><span class="unit">°</span>
        </div>
        <div class="readout">
          <svg class="axis-ico" viewBox="0 0 24 24"><path d="M3 12l5-4v3h8V8l5 4-5 4v-3H8v3z"/></svg>
          <span id="roll-value" class="mid-num">0.0</span><span class="unit">°</span>
        </div>
      </div>
    </div>

    <!-- edge mode: bar level for a device standing on one edge -->
    <div id="level-edge">
      <div class="horizon-wrap">
        <div class="horizon-fixed"></div>
        <div id="horizon-line"></div>
      </div>
      <div class="edge-bottom">
        <svg id="edge-indicator" viewBox="0 0 40 64" aria-hidden="true">
          <rect class="phone-body" x="6" y="4" width="28" height="56" rx="6"/>
          <rect id="edge-b" class="edge-seg" x="10" y="57" width="20" height="3" rx="1.5"/>
          <rect id="edge-t" class="edge-seg" x="10" y="4"  width="20" height="3" rx="1.5"/>
          <rect id="edge-l" class="edge-seg" x="6"  y="22" width="3"  height="20" rx="1.5"/>
          <rect id="edge-r" class="edge-seg" x="31" y="22" width="3"  height="20" rx="1.5"/>
        </svg>
        <div class="readout">
          <span id="edge-value" class="big-num">0.0</span><span class="unit">°</span>
        </div>
      </div>
    </div>

  </section>

  <!-- Bottom bar -->
  <footer id="bottombar">
    <button id="device-btn" class="bar-btn">
      <svg viewBox="0 0 24 24"><rect x="7" y="2.5" width="10" height="19" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="18.4" r="1" fill="currentColor"/></svg>
      <span id="device-name">…</span>
      <span id="cal-badge" class="badge" hidden>!</span>
    </button>
    <button id="settings-btn" class="bar-btn icon-only" aria-label="settings">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 8.6a3.4 3.4 0 1 0 0 6.8 3.4 3.4 0 0 0 0-6.8zm8.94 3.4c0-.5-.05-.98-.13-1.45l2.02-1.58-2-3.46-2.39.96c-.74-.6-1.58-1.09-2.5-1.43L15.5 2.5h-4l-.44 2.54c-.92.34-1.76.83-2.5 1.43l-2.39-.96-2 3.46 2.02 1.58c-.08.47-.13.95-.13 1.45s.05.98.13 1.45l-2.02 1.58 2 3.46 2.39-.96c.74.6 1.58 1.09 2.5 1.43l.44 2.54h4l.44-2.54c.92-.34 1.76-.83 2.5-1.43l2.39.96 2-3.46-2.02-1.58c.08-.47.13-.95.13-1.45z" transform="scale(0.92) translate(1,1)"/></svg>
    </button>
  </footer>

</main>

<!-- Ruler pinned to the physical right edge -->
<canvas id="ruler"></canvas>

<!-- iOS sensor permission gate -->
<div id="sensor-gate" class="overlay" hidden>
  <button id="sensor-enable" class="gate-btn" aria-label="enable sensors">
    <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5z" transform="rotate(45 12 12)"/></svg>
  </button>
</div>

<!-- Settings bottom sheet -->
<div id="sheet-backdrop" class="overlay" hidden></div>
<div id="settings-sheet" hidden>
  <div class="sheet-grip"></div>

  <div id="current-device" class="sheet-row current">
    <svg viewBox="0 0 24 24"><rect x="7" y="2.5" width="10" height="19" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
    <div class="cur-info">
      <span id="sheet-device-name">–</span>
      <span id="sheet-device-detail" class="dim"></span>
    </div>
    <span id="sheet-method" class="method-badge"></span>
  </div>

  <div class="sheet-row search-row">
    <svg viewBox="0 0 24 24"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
    <input id="device-search" type="search" autocomplete="off" spellcheck="false">
  </div>
  <ul id="device-list"></ul>

  <div class="sheet-row manual-row">
    <svg viewBox="0 0 24 24"><path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75z"/></svg>
    <input id="diag-input" type="number" step="0.01" min="3" max="15" inputmode="decimal" placeholder='6.10"'>
    <input id="resw-input" type="number" step="1" min="480" inputmode="numeric" placeholder="1080">
    <span class="x">×</span>
    <input id="resh-input" type="number" step="1" min="480" inputmode="numeric" placeholder="2340">
    <button id="manual-apply" class="mini-btn" aria-label="apply">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg>
    </button>
  </div>

  <div class="sheet-actions">
    <button id="card-cal-btn" class="action-btn" aria-label="credit card calibration">
      <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.7"/><rect x="2" y="8.5" width="20" height="3" fill="currentColor"/></svg>
    </button>
    <button id="reset-btn" class="action-btn danger" aria-label="reset calibration">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 5V2L7 6l5 4V7a5.9 5.9 0 1 1-6 5.9H4A8 8 0 1 0 12 5z"/></svg>
    </button>
  </div>
</div>

<!-- Credit card calibration overlay -->
<div id="card-overlay" class="overlay" hidden>
  <div id="card-shape">
    <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="2" y="8.5" width="20" height="3" fill="currentColor"/></svg>
    <div id="card-handle"></div>
  </div>
  <div class="card-tools">
    <span id="card-mm" class="dim">85.60 mm</span>
    <button id="card-ok" class="gate-btn small" aria-label="confirm">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg>
    </button>
    <button id="card-cancel" class="gate-btn small ghost" aria-label="cancel">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 6.4 17.6 5 12 10.6 6.4 5 5 6.4 10.6 12 5 17.6 6.4 19 12 13.4 17.6 19 19 17.6 13.4 12z"/></svg>
    </button>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
